<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeenZone</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    color: white;
    padding: 20px;
}

/* glow circles */
.circle {
    position: absolute;
    width: 220px;
    height: 220px;
    background: rgba(0, 255, 255, 0.15);
    border-radius: 50%;
    filter: blur(70px);
}

.circle:nth-child(1) { top: 10%; left: 10%; }
.circle:nth-child(2) { bottom: 10%; right: 10%; background: rgba(255,0,150,0.15); }

/* container */
.container {
    width: 100%;
    max-width: 500px;
    padding: 30px;
    border-radius: 20px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    z-index: 1;
}

/* logo */
.logo {
    display: block;
    margin: 0 auto 15px;
    width: 80px;
    border-radius: 20%;
    filter: drop-shadow(0 0 10px #22c55e);
}

/* title */
h1 {
    font-size: 2.8rem;
    background: linear-gradient(90deg, #00f5ff, #ff00d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tagline {
    margin-top: 10px;
    color: #aaa;
    font-size: 0.95rem;
}

/* input */
input {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;

    background: rgba(0,0,0,0.4);
    color: white;
}

/* button */
button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;

    border: none;
    border-radius: 10px;

    background: linear-gradient(90deg, #00f5ff, #ff00d4);
    color: white;
    font-weight: bold;

    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* result */
.result {
    margin-top: 25px;
    padding: 15px;
    border-radius: 12px;

    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.08);

    text-align: left;
}

.result p {
    margin: 8px 0;
}

.label {
    color: #00f5ff;
}

/* responsive */
@media(max-width:600px){
    h1{
        font-size:2rem;
    }
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="container">

    <img src="/static/logo.png" class="logo" alt="logo">

    <h1>SeenZone</h1>
    <div class="tagline">Stop Overthinking. See Clearly.</div>

    <form method="POST">

        <!-- 🔥 NEW FIELD (only addition) -->
        <input type="text" placeholder="Sender (e.g., He / She / Friend)">

        <!-- existing field -->
        <input type="text" name="message" placeholder="Paste message here..." required>

        <button type="submit">Analyze</button>
    </form>

    {% if result %}
    <div class="result">
        <p><span class="label">Message:</span> {{ result.message }}</p>
        <p><span class="label">Meaning:</span> {{ result.meaning }}</p>
        <p><span class="label">Tone:</span> {{ result.tone }}</p>
        <p><span class="label">Risk:</span> {{ result.risk }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
